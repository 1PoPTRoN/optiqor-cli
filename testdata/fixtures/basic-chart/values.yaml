# Demo chart — exercises every Year-1 detector.
# - api      cpu-overprovisioned + memory-overprovisioned
# - worker   missing-memory-limit + missing-cpu-limit
# - cache    image-pinned-latest (Tag: latest)
# - logger   image-pinned-latest (no tag)
# - clean    fully right-sized; produces no findings

api:
  image:
    repository: example/api
    tag: "1.4.2"
  replicas: 3
  resources:
    requests:
      cpu: "2"
      memory: "1.6Gi"
    limits:
      cpu: "2.5"
      memory: "2Gi"

worker:
  image: example/worker:0.9.0
  replicas: 2
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"

cache:
  image:
    repository: redis
    tag: "latest"
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

logger:
  image: fluentd
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

clean:
  image:
    repository: example/clean
    tag: "v3.2.1"
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
