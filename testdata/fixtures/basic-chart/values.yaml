# Demo chart — exercises every one of the 30 Phase-3 detectors.
# Cost workloads:
#   - api            cpu-overprovisioned + memory-overprovisioned
#   - worker         missing-memory-limit + missing-cpu-limit (also security)
#   - cache          image-pinned-latest (Tag: latest)
#   - logger         image-pinned-latest (no tag)
#   - shipper        replicas-too-high (10 replicas, no HPA)
#   - bursty         cpu-limit-far-above-request + memory-limit-far-above-request
#   - dev-build      unbounded-image-tag (tag: main) + read-only-root-fs-missing
#   - megabox        oversized-cpu-limit + oversized-memory-limit + excessive-replica-count
#   - incomplete     cpu-without-memory-request + tiny-cpu-request
#   - guaranteed     cpu/memory-request-equals-limit + service-account-token-automount
# Security workloads:
#   - admin-tool     privileged-container + run-as-root (explicit) + allow-privilege-escalation
#   - sniffer        host-network + host-path-volume
#   - ptrace-hunter  dangerous-capability-added (SYS_PTRACE) + capabilities-not-dropped-all
#                    + runs-as-uid-zero + host-pid
# - clean            fully right-sized + secure; produces no findings.

api:
  image:
    repository: example/api
    tag: "1.4.2"
  replicas: 3
  resources:
    requests:
      cpu: "2"
      memory: "1.6Gi"
    limits:
      cpu: "2.5"
      memory: "2Gi"

worker:
  image: example/worker:0.9.0
  replicas: 2
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
  # Workload sets runAsNonRoot so it doesn't trip the security detector
  # along with the resource ones we want to exercise.
  securityContext:
    runAsNonRoot: true

cache:
  image:
    repository: redis
    tag: "latest"
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  securityContext:
    runAsNonRoot: true

logger:
  image: fluentd
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  securityContext:
    runAsNonRoot: true

shipper:
  image:
    repository: example/shipper
    tag: "v2.1.0"
  replicas: 10
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  securityContext:
    runAsNonRoot: true

admin-tool:
  image:
    repository: example/admin
    tag: "v0.4.0"
  replicas: 1
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"
  securityContext:
    privileged: true
    runAsNonRoot: false
    allowPrivilegeEscalation: true
    readOnlyRootFilesystem: true

sniffer:
  image:
    repository: example/sniffer
    tag: "v1.0.0"
  replicas: 1
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"
  volumes:
    - name: host-logs
      hostPath:
        path: /var/log
  securityContext:
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
  podSecurityContext:
    hostNetwork: true

bursty:
  image:
    repository: example/queue-worker
    tag: "v3.1.4"
  replicas: 2
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "2"
      memory: "4Gi"
  securityContext:
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false

dev-build:
  image:
    repository: example/scratch
    tag: "main"
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false

megabox:
  # Triggers oversized-cpu-limit + oversized-memory-limit + excessive-replica-count
  image:
    repository: example/data-cruncher
    tag: "v4.0.0"
  replicas: 25
  resources:
    requests:
      cpu: "2"
      memory: "8Gi"
    limits:
      cpu: "8"
      memory: "32Gi"
  securityContext:
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  automountServiceAccountToken: false

ptrace-hunter:
  # Triggers dangerous-capability-added (SYS_PTRACE) + capabilities-not-dropped-all + runs-as-uid-zero + host-pid
  image:
    repository: example/profiler
    tag: "v0.7.2"
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  securityContext:
    runAsUser: 0
    runAsNonRoot: false
    capabilities:
      add: [SYS_PTRACE]
  podSecurityContext:
    hostPID: true
  automountServiceAccountToken: false

incomplete:
  # Triggers cpu-without-memory-request + tiny-cpu-request
  image:
    repository: example/incomplete
    tag: "v1.0.0"
  replicas: 1
  resources:
    requests:
      cpu: "5m"
    limits:
      cpu: "5m"
  securityContext:
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  automountServiceAccountToken: false

memhog:
  # Triggers memory-without-cpu-request + tiny-memory-request + host-ipc
  image:
    repository: example/memhog
    tag: "v0.2.0"
  replicas: 1
  resources:
    requests:
      memory: "16Mi"
  securityContext:
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  podSecurityContext:
    hostIPC: true
  automountServiceAccountToken: false

guaranteed:
  # Triggers cpu-request-equals-limit + memory-request-equals-limit + service-account-token-automount (default)
  image:
    repository: example/guaranteed
    tag: "v2.1.0"
  replicas: 1
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  securityContext:
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]

clean:
  image:
    repository: example/clean
    tag: "v3.2.1"
  replicas: 2
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
