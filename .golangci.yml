run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - copyloopvar
    - errorlint
    - gocritic
    - gosec
    - misspell
    - prealloc
    - revive
    - unconvert

issues:
  exclude-rules:
    - path: _test\.go
      linters: [gosec, errcheck]
  max-issues-per-linter: 0
  max-same-issues: 0
