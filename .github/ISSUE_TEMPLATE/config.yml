# Issue template chooser.
blank_issues_enabled: false

contact_links:
  - name: Question or discussion
    url: https://github.com/optiqor/optiqor-cli/discussions
    about: Ask the community — usage questions, design discussion, "is this a bug?"
  - name: Security vulnerability
    url: https://github.com/optiqor/optiqor-cli/security/advisories/new
    about: Privately report a vulnerability via GitHub Security Advisories — do NOT open a public issue.
  - name: Documentation
    url: https://github.com/optiqor/optiqor-cli#readme
    about: Read the README and CONTRIBUTING before reporting.
